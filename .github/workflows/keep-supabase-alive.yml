name: Keep Supabase alive

on:
  schedule:
    # Runs every 5 days at 08:00 UTC
    - cron: "0 8 */5 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/parts?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          echo "Supabase responded with HTTP $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "OK — project is active"
          else
            echo "WARNING — unexpected response"
            exit 1
          fi

      # GitHub disables scheduled workflows after 60 days of repo inactivity.
      # A lightweight commit every 55 days keeps the repo "active".
      - name: Keep repo active
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_COMMIT_DATE=$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/commits?per_page=1" \
            | grep -m1 '"date"' | head -1 | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
          DAYS_AGO=$(( ($(date +%s) - $(date -d "$LAST_COMMIT_DATE" +%s)) / 86400 ))
          echo "Last commit was $DAYS_AGO days ago ($LAST_COMMIT_DATE)"
          if [ "$DAYS_AGO" -ge 55 ]; then
            git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git repo
            cd repo
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            date -u +%Y-%m-%dT%H:%M:%SZ > .github/.last-keepalive
            git add .github/.last-keepalive
            git commit -m "chore: keep repo active for scheduled workflows"
            git push
            echo "Pushed keepalive commit"
          else
            echo "Repo is active ($DAYS_AGO days) — no commit needed"
          fi
